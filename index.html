<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliabu Ngata - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .description {
            background: #f8f9fa;
            padding: 20px;
            border-left: 4px solid #667eea;
            margin-bottom: 30px;
            border-radius: 5px;
        }
        
        h2 {
            color: #667eea;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        
        .contact-list {
            list-style: none;
        }
        
        .contact-list li {
            margin: 12px 0;
            display: flex;
            align-items: center;
        }
        
        .contact-list a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .contact-list a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .icon {
            margin-right: 10px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Eliabu Ngata</h1>
        <p class="subtitle">Electrical Engineering Student</p>
        
        <div class="description">
            <p>Welcome to my portfolio! I'm an Electrical Engineering student passionate about industrial control systems and automation.</p>
        </div>
        
        <h2>Contact</h2>
        <ul class="0747199336 or 0611466591">
            <li>
                <span class="icon">📧</span>
                <a href="mailto:your.eliabungata@gmail.com">your.email@example.com</a>
            </li>
            <li>
                <span class="icon">💼</span>
                <a href="https://linkedin.com/in/eliabu-ngata" target="_blank">LinkedIn Profile</a>
            </li>
            <li>
                <span class="icon">🐙</span>
                <a href="https://github.com/eliabungata" target="_blank">GitHub Profile</a>
            </li>
        </ul>
    </div>
</body>
</html>
